# Codacy configuration
# https://docs.codacy.com/repositories-configure/codacy-configuration-file/

engines:
  ruff:
    enabled: true
  mypy:
    enabled: true
  radon:
    enabled: true
    complexity_threshold: 10
  pylint:
    enabled: false  # wir nutzen ruff
  bandit:
    enabled: true
  trivy:
    enabled: true   # Dependency-Vuln-Scan (pyproject.toml, manifest.json requirements)

exclude_paths:
  - tests/**
  - docs/**
  - .github/**
  - .claude/**
  - .chglog/**
  - "**/__pycache__/**"
  - "**/*.pyc"
