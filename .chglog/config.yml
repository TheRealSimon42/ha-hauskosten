style: github
template: CHANGELOG.tpl.md
info:
  title: CHANGELOG
  repository_url: https://github.com/TheRealSimon42/ha-hauskosten
options:
  tag_filter_pattern: '^v[0-9]+\.[0-9]+\.[0-9]+$'
  commits:
    sort_by: Author.date
    filters:
      Type:
        - feat
        - fix
        - perf
        - refactor
        - docs
        - chore
  commit_groups:
    sort_by: Custom
    title_order:
      - feat
      - fix
      - perf
      - refactor
      - chore
      - docs
    title_maps:
      feat: Features
      fix: Bugfixes
      perf: Performance
      refactor: Refactoring
      chore: Chores
      docs: Documentation
  header:
    pattern: "^(\\w+)(?:\\(([^)]+)\\))?:\\s(.*)$"
    pattern_maps:
      - Type
      - Scope
      - Subject
