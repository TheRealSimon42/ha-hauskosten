name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(jq -r .version custom_components/hauskosten/manifest.json)
          if [ "$MANIFEST_VERSION" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "Manifest version ($MANIFEST_VERSION) does not match tag (${{ steps.version.outputs.VERSION }})"
            exit 1
          fi

      - name: Install git-chglog
        run: |
          CHGLOG_VERSION=0.15.4
          wget -q "https://github.com/git-chglog/git-chglog/releases/download/v${CHGLOG_VERSION}/git-chglog_${CHGLOG_VERSION}_linux_amd64.tar.gz"
          tar -xzf "git-chglog_${CHGLOG_VERSION}_linux_amd64.tar.gz"
          sudo mv git-chglog /usr/local/bin/
          git-chglog --version

      - name: Generate release notes
        run: |
          git-chglog --config .chglog/release-config.yml --output release_notes.md "${GITHUB_REF_NAME}"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: false
