name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff + Mypy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy homeassistant voluptuous-stubs

      - name: Ruff check
        run: ruff check --output-format=github custom_components/hauskosten tests

      - name: Ruff format
        run: ruff format --check custom_components/hauskosten tests

      - name: Mypy
        run: mypy --strict custom_components/hauskosten
